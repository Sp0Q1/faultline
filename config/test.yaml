# Faultline — Test Configuration

logger:
  enable: false
  pretty_backtrace: true
  level: debug
  format: compact

server:
  port: 5150
  host: http://localhost
  middlewares:
    static:
      enable: true
      must_exist: true
      precompressed: false
      folder:
        uri: "/static"
        path: "assets/static"
      fallback: "assets/static/404.html"

workers:
  mode: ForegroundBlocking

mailer:
  stub: true
  smtp:
    enable: true
    host: localhost
    port: 1025
    secure: false

settings:
  auth:
    allowed_email_domains:
      - example.com
      - gmail.com

database:
  uri: {{ get_env(name="DATABASE_URL", default="sqlite://faultline_test.sqlite?mode=rwc") }}
  enable_logging: false
  connect_timeout: {{ get_env(name="DB_CONNECT_TIMEOUT", default="500") }}
  idle_timeout: {{ get_env(name="DB_IDLE_TIMEOUT", default="500") }}
  min_connections: {{ get_env(name="DB_MIN_CONNECTIONS", default="1") }}
  max_connections: {{ get_env(name="DB_MAX_CONNECTIONS", default="1") }}
  auto_migrate: true
  dangerously_truncate: true
  dangerously_recreate: true

auth:
  jwt:
    secret: YDGTggqbTDRmdmYU6YU8
    expiration: 604800
